version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aapleshasan_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aapleshasan}
      POSTGRES_USER: ${POSTGRES_USER:-aapleshasan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aapleshasan_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aapleshasan_net

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: aapleshasan_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aapleshasan_net

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aapleshasan_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - aapleshasan_net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aapleshasan_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - aapleshasan_net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: aapleshasan_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - aapleshasan_net

volumes:
  postgres_data:
  redis_data:

networks:
  aapleshasan_net:
    driver: bridge
